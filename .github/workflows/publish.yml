name: Publish Package to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Debug OIDC Environment
        run: |
          echo "OIDC token URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:+Present}"
          npm config list

      - name: Publish to npm
        run: npm publish --access public --provenance
